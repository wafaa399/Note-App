<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A modern Notes App to create, edit, search, and manage your notes efficiently."
    />
    <meta name="keywords" content="Notes App, Notes, Todo, Tasks Pinned" />
    <meta name="author" content="Wafaa Ahmed" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Notes App</title>
    <link rel="icon" type="image/png" href="./img/Logo.png" />
  </head>
  <body>
    <div class="app">
      <!--Side Bar-->
      <aside class="sidebar">
        <div class="sidebar-logo"><span>Almdrasa-Notes</span></div>
        <div class="sidebar-search">
          <div class="search-wrap">
            <label for="searchInput"
              ><ion-icon name="search-outline"></ion-icon
            ></label>
            <input id="searchInput" type="text" placeholder="Search" />
          </div>
        </div>
      </aside>
    </div>
  </body>
</html>
