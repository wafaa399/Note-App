<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A modern Notes App to create, edit, search, and manage your notes efficiently."
    />
    <meta name="keywords" content="Notes App, Notes, Todo, Tasks Pinned" />
    <meta name="author" content="Wafaa Ahmed" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
    ></script>
    <title>Notes App</title>
    <link rel="icon" type="image/png" href="./img/Logo.png" />
  </head>
  <body>
    <div class="app">
      <!--Side Bar-->
      <aside class="sidebar">
        <div class="sidebar-logo"><span>Almdrasa-Notes</span></div>
        <div class="sidebar-search">
          <div class="search-wrap">
            <label for="searchInput" class="search-label">
              <ion-icon name="search-outline"></ion-icon>
            </label>
            <input id="searchInput" type="search" placeholder="Search" />
          </div>
        </div>
        <div class="px-4 pb-2 flex flex-col gap-1 text-sm">
          <a
            href="#"
            onclick="
              showHome();
              return false;
            "
            class="text-gray-700 py-1"
            >Notes</a
          >
          <a
            href="#"
            onclick="
              openAddPanel();
              return false;
            "
            class="text-gray-500 py-1"
            >Add Note</a
          >
        </div>
      </aside>
    </div>
  </body>
</html>
