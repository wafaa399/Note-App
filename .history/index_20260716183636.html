<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A modern Notes App to create, edit, search, and manage your notes efficiently."
    />
    <meta name="keywords" content="Notes App, Notes, Todo, Tasks Pinned" />
    <meta name="author" content="Wafaa Ahmed" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
    ></script>
    <title>Notes App</title>
    <link rel="icon" type="image/png" href="./img/Logo.png" />
    <style>
      * {
        font-family: Arial, Helvetica, sans-serif;
      }
      body {
        background: #f4f4f4;
        color: #222;
      }
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-thumb {
        background: #ddd;
        border-radius: 8px;
      }
      .note-card {
        transition: background 0.15s ease;
      }
      .note-card:hover {
        background: #f7f7f7;
      }
      .note-card.active {
        background: #fdf1f0;
      }
      .fade-in {
        animation: fadeIn 0.2s ease;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
    </style>
  </head>
</html>
