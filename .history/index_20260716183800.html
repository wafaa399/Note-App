<!doctype html>
<body lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A modern Notes App to create, edit, search, and manage your notes efficiently."
    />
    <meta name="keywords" content="Notes App, Notes, Todo, Tasks Pinned" />
    <meta name="author" content="Wafaa Ahmed" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
    ></script>
    <title>Notes App</title>
    <link rel="icon" type="image/png" href="./img/Logo.png" />
    <style>
      * {
        font-family: Arial, Helvetica, sans-serif;
      }
      body {
        background: #f4f4f4;
        color: #222;
      }
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-thumb {
        background: #ddd;
        border-radius: 8px;
      }
      .note-card {
        transition: background 0.15s ease;
      }
      .note-card:hover {
        background: #f7f7f7;
      }
      .note-card.active {
        background: #fdf1f0;
      }
      .fade-in {
        animation: fadeIn 0.2s ease;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body class="min-h-screen">
 
<div class="flex h-screen overflow-hidden">
 
  <!-- Sidebar -->
  <aside class="w-[280px] shrink-0 bg-white border-r border-gray-200 flex flex-col">
    <div class="px-5 pt-5 pb-3">
      <h1 class="text-lg font-bold"><span class="text-[#EB5757]">Almdrasa</span>-Notes</h1>
    </div>
 
    <div class="px-4 pb-3">
      <div class="relative">
        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3" stroke-linecap="round"/></svg>
        <input id="searchInput" type="text" placeholder="Search"
          class="w-full bg-gray-50 border border-gray-200 rounded-md py-2 pl-9 pr-3 text-sm outline-none focus:border-[#EB5757]">
      </div>
    </div>
 
    <div class="px-4 pb-2 flex flex-col gap-1 text-sm">
      <a href="#" onclick="showHome();return false;" class="text-gray-700 py-1">Notes</a>
      <a href="#" onclick="openAddPanel();return false;" class="text-gray-500 py-1">Add Note</a>
    </div>
 
    <div class="flex-1 overflow-y-auto px-3 pb-4 mt-2">
      <div id="pinnedSection">
        <p class="px-2 pt-2 pb-1 text-[11px] font-bold text-[#EB5757] tracking-wide">PINNED</p>
        <div id="pinnedList"></div>
      </div>
      <div>
        <p class="px-2 pt-3 pb-1 text-[11px] font-bold text-gray-400 tracking-wide">Notes</p>
        <div id="notesList"></div>
      </div>
      <p id="emptyState" class="hidden text-center text-sm text-gray-400 py-10">No matching notes</p>
    </div>
  </aside>
 
  <!-- Main content -->
  <main class="flex-1 relative overflow-y-auto bg-[#FAFAFA]">
    <div class="border-b border-gray-200 bg-white px-8 py-3 flex items-center gap-2">
      <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/></svg>
      <span id="pageLabel" class="text-sm text-gray-500">Home</span>
    </div>
 
    <div id="noteView" class="max-w-2xl mx-auto px-10 py-10 fade-in"></div>
 
    <!-- Add note panel -->
    <div id="addPanel" class="hidden max-w-md mx-auto px-10 py-10 fade-in">
      <h2 class="text-xl font-bold mb-6">Add Note</h2>
 
      <label class="block text-xs text-gray-500 mb-1">Title*</label>
      <input id="inputTitle" type="text"
        class="w-full bg-gray-100 border border-gray-200 rounded-md px-3 py-2.5 mb-4 text-sm outline-none focus:border-[#EB5757] focus:bg-white">
 
      <label class="block text-xs text-gray-500 mb-1">Author*</label>
      <input id="inputAuthor" type="text"
        class="w-full bg-gray-100 border border-gray-200 rounded-md px-3 py-2.5 mb-4 text-sm outline-none focus:border-[#EB5757] focus:bg-white">
 
      <label class="block text-xs text-gray-500 mb-1">Your Note*</label>
      <textarea id="inputBody" rows="6"
        class="w-full bg-gray-100 border border-gray-200 rounded-md px-3 py-2.5 mb-2 text-sm outline-none focus:border-[#EB5757] focus:bg-white resize-none"></textarea>
      <p id="formError" class="hidden text-xs text-[#EB5757] mb-3">Please fill in all required fields.</p>
 
      <div class="flex gap-3 mt-3">
        <button onclick="saveNote(false)" class="bg-[#EB5757] hover:bg-[#d94848] text-white text-sm font-semibold px-4 py-2 rounded-md">Add Note</button>
        <button onclick="saveNote(true)" class="bg-[#FDEBEB] hover:bg-[#fbdcdc] text-[#EB5757] text-sm font-semibold px-4 py-2 rounded-md">Add pinned note</button>
      </div>
    </div>
 
    <!-- Floating add button -->
    <button id="fabAdd" onclick="openAddPanel()"
      class="fixed bottom-8 right-8 w-12 h-12 rounded-full bg-[#EB5757] hover:bg-[#d94848] text-white text-2xl leading-none flex items-center justify-center shadow-lg">+</button>
  </main>
</div>

<script>
let notes = [
  {id:1, title:"Business Partners Work at Modern Office", author:"Yousef", date:"Feb 8, 2021", pinned:true,
   body:"Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed at arcu dui. Lorem dolor sit amet, adipiscing placerat mauris nisl. Proin vitae urna eu sem pellentesque laoreet.\n\nLorem ipsum dolor sit amet, consectetur adipiscing elit. Sed at arcu dui. Lorem dolor sit amet, adipiscing placerat mauris nisl. Proin vitae urna eu sem pellentesque laoreet."},
  {id:2, title:"Light & Bright in Brooklyn", author:"Sara", date:"Feb 8, 2021", pinned:true,
   body:"Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed at arcu dui. Lorem dolor sit amet, adipiscing placerat mauris nisl."},
  {id:3, title:"Business Partners Work at Modern Office", author:"Yousef", date:"Feb 8, 2021", pinned:false,
   body:"Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed at arcu dui. Lorem dolor sit amet, adipiscing placerat mauris nisl. Proin vitae urna eu sem pellentesque laoreet."},
  {id:4, title:"Business Partners Work at Modern Office", author:"Yousef", date:"Feb 8, 2021", pinned:false,
   body:"Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed at arcu dui. Lorem dolor sit amet, adipiscing placerat mauris nisl. Proin vitae urna eu sem pellentesque laoreet."},
  {id:5, title:"Light & Bright in Brooklyn", author:"Sara", date:"Feb 8, 2021", pinned:false,
   body:"Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed at arcu dui. Lorem dolor sit amet, adipiscing placerat mauris nisl."},
  {id:6, title:"Business Partners Work at Modern Office", author:"Yousef", date:"Feb 8, 2021", pinned:false,
   body:"Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed at arcu dui. Lorem dolor sit amet, adipiscing placerat mauris nisl. Proin vitae urna eu sem pellentesque laoreet."},
  {id:7, title:"Business Partners Work at Modern Office", author:"Yousef", date:"Feb 8, 2021", pinned:false,
   body:"Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed at arcu dui. Lorem dolor sit amet, adipiscing placerat mauris nisl. Proin vitae urna eu sem pellentesque laoreet."},
];
let activeId = notes[0].id;
let nextId = 8;
 
function render(){
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const pinned = notes.filter(n=>n.pinned && n.title.toLowerCase().includes(q));
  const others = notes.filter(n=>!n.pinned && n.title.toLowerCase().includes(q));
 
  document.getElementById('pinnedSection').classList.toggle('hidden', pinned.length===0);
  document.getElementById('pinnedList').innerHTML = pinned.map(cardHTML).join('');
  document.getElementById('notesList').innerHTML = others.map(cardHTML).join('');
  document.getElementById('emptyState').classList.toggle('hidden', (pinned.length+others.length)>0);
 
  renderNoteView();
}
 
function cardHTML(n){
  const active = n.id===activeId ? 'active' : '';
  return `
    <div class="note-card ${active} rounded-md px-3 py-2.5 cursor-pointer border-b border-gray-100" onclick="selectNote(${n.id})">
      <p class="text-[13px] font-semibold text-gray-800 leading-snug">${escapeHTML(n.title)}</p>
      <p class="text-[12px] text-gray-400 mt-0.5 line-clamp-1">${escapeHTML(n.body)}</p>
      <div class="flex items-center justify-between mt-1">
        <p class="text-[11px] text-gray-400">${n.date}</p>
        <button onclick="event.stopPropagation(); deleteNote(${n.id})" class="text-[11px] text-[#EB5757]">Delete</button>
      </div>
    </div>`;
}
 
function selectNote(id){
  activeId = id;
  showHome();
}
 
function showHome(){
  document.getElementById('addPanel').classList.add('hidden');
  document.getElementById('noteView').classList.remove('hidden');
  document.getElementById('fabAdd').classList.remove('hidden');
  document.getElementById('pageLabel').textContent = 'Home';
  render();
}
 
function renderNoteView(){
  const view = document.getElementById('noteView');
  const n = notes.find(x=>x.id===activeId);
  if(!n){
    view.innerHTML = `<p class="text-sm text-gray-400 text-center mt-24">Select a note or add a new one.</p>`;
    return;
  }
  view.innerHTML = `
    <div class="fade-in">
      <h2 class="text-2xl font-bold leading-tight mb-1">${escapeHTML(n.title)}</h2>
      <p class="text-xs text-gray-400 mb-6">${n.date} / By ${escapeHTML(n.author)}</p>
      <p class="text-sm leading-7 text-gray-600 whitespace-pre-line">${escapeHTML(n.body)}</p>
    </div>`;
}
 
function openAddPanel(){
  document.getElementById('addPanel').classList.remove('hidden');
  document.getElementById('noteView').classList.add('hidden');
  document.getElementById('fabAdd').classList.add('hidden');
  document.getElementById('pageLabel').textContent = 'Add Note';
  document.getElementById('formError').classList.add('hidden');
}
 
function saveNote(pin){
  const title = document.getElementById('inputTitle').value.trim();
  const author = document.getElementById('inputAuthor').value.trim();
  const body = document.getElementById('inputBody').value.trim();
  if(!title || !author || !body){
    document.getElementById('formError').classList.remove('hidden');
    return;
  }
  const today = new Date();
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const date = `${months[today.getMonth()]} ${today.getDate()}, ${today.getFullYear()}`;
 
  const newNote = {id: nextId++, title, author, date, pinned: pin, body};
  notes.unshift(newNote);
  activeId = newNote.id;
  document.getElementById('inputTitle').value='';
  document.getElementById('inputAuthor').value='';
  document.getElementById('inputBody').value='';
  showHome();
}
 
function deleteNote(id){
  notes = notes.filter(n=>n.id!==id);
  if(activeId===id){
    activeId = notes.length ? notes[0].id : null;
  }
  render();
}
 
function escapeHTML(str){
  const d = document.createElement('div');
  d.innerText = str;
  return d.innerHTML;
}
 
document.getElementById('searchInput').addEventListener('input', render);
 
render();
</script>
</body>
</html>
