      </div>

      <div class="px-4 pb-3">
        <div class="relative">
          <svg
            class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
          >
            <circle cx="11" cy="11" r="7" />
            <path d="m21 21-4.3-4.3" stroke-linecap="round" />
          </svg>
          <input

            type="text"
            placeholder="Search"
            class="w-full bg-gray-50 border border-gray-200 rounded-md py-2 pl-9 pr-3 text-sm outline-none focus:border-[#EB5757]"
